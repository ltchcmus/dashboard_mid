app:
  title: "Bảng điều khiển phân tích dữ liệu Netflix"
  data_dir: "data/processed"
  font_family: '"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  theme:
    app_background: "linear-gradient(180deg, #FFFFFF 0%, #FFF8F8 42%, #F4FFFF 100%)"
    sidebar_background: "linear-gradient(180deg, #FFFFFF 0%, #F5FBFB 100%)"
    header_height_px: 72
    header_font_size_rem: 2.2
    main_padding_top_rem: 4.8
    tab_font_size_rem: 1.22
    tab_font_size_active_rem: 1.28

colors:
  netflix_red: "#E50914"
  netflix_gold: "#FFB100"
  text_dark: "#1F2937"
  chart_bg: "#FFFFFF"
  neutral_grey: "#BFBFBF"

palettes:
  seq_count:
    - "#FFEBEE"
    - "#E50914"
    - "#80060B"
  diverge_quality:
    - "#E50914"
    - "#F8F9FA"
    - "#FFB100"
  cat_genre:
    - "#E50914"
    - "#221F1F"
    - "#FFB100"
    - "#F5F5F1"
    - "#564D4D"
    - "#B20710"
    - "#831010"
    - "#E1E1E1"
  vivid_genre:
    - "#E50914"
    - "#FF7A00"
    - "#FFB100"
    - "#00A676"
    - "#00A8E8"
    - "#6A4CFF"
    - "#FF3CAC"
    - "#17BEBB"
    - "#1D4ED8"

quality_bucket_colors:
  "Kém (0-5)": "#B22222"
  "TB (5-6)": "#D96B6B"
  "Khá (6-7)": "#E5E7EB"
  "Tốt (7-8)": "#FFB100"
  "Xuất sắc (8-10)": "#00A651"

